services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      # connect tests to playwright server via websocket
      - PW_TEST_CONNECT_WS_ENDPOINT=ws://playwright:3000/
      # allows playwright server to reach dev server
      - BASE_URL=http://dev:3000
    ports:
      - "3000:3000"
      - "9323:9323"
    depends_on:
      playwright:
        condition: service_healthy
    networks:
      - paleui_net

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    init: true
    ipc: host
    environment:
      - CI=true
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r => r.ok || process.exit(1)).catch(() => process.exit(1))\"" ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    # internal only - dev container connects via service name
    expose:
      - "3000"

networks:
  paleui_net:
    name: paleui_devcontainer_net
