<section>
	<hgroup>
		<h1>Checkbox</h1>
		<p>Semantic HTML checkbox element.</p>

		<div role="status" class="secondary">
			<a target="_blank" rel="noopener noreferrer"
				href="https://developer.mozilla.org/en-US/docs/Web/HTML/Element/checkbox">MDN: &lt;input type="checkbox"&gt;</a>
		</div>
	</hgroup>

	<div class="tabs">
		<input type="radio" name="head" id="head-preview" checked />
		<input type="radio" name="head" id="head-html" />

		<span role="tablist">
			<label for="head-preview" role="tab">Preview</label>
			<label for="head-html" role="tab">HTML</label>
		</span>

		<div role="tabpanel">
			<object>
				<div data-to-code="#head-html-panel" class="max-width">
					<label>
						<input type="checkbox">
						<span role="none"></span>
						Accept terms and conditions
					</label>
				</div>
			</object>
		</div>
		<div role="tabpanel">
			<object>
				<div id="head-html-panel"></div>
			</object>
		</div>
	</div>
</section>

<section>
	<h2 id="examples">Examples</h2>

	<hgroup id="details">
		<h3>Details</h3>
		<p>
			You can additionally provide more details for the checkbox.
		</p>
	</hgroup>

	<p>
		The <code>&lt;small&gt;</code> can be added, and manually layouted to display more info.
	</p>

	<div class="tabs">
		<input type="radio" name="details" id="details-preview" checked />
		<input type="radio" name="details" id="details-html" />

		<span role="tablist">
			<label for="details-preview" role="tab">Preview</label>
			<label for="details-html" role="tab">HTML</label>
		</span>

		<div role="tabpanel">
			<object>
				<div data-to-code="#details-html-panel" class="max-width flex-row gap">
					<label style="align-items: start; gap: 0.8rem;">
						<input type="checkbox">
						<div style="display: flex; flex-direction: column; gap: 0.5rem;">
							Accept terms and conditions
							<small>
								By clicking this checkbox, you agree to the terms and conditions.
							</small>
						</div>
					</label>
				</div>
			</object>
		</div>
		<div role="tabpanel">
			<object>
				<div id="details-html-panel"></div>
			</object>
		</div>
	</div>
</section>
